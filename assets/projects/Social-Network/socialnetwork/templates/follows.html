{% extends "base.html" %}

{% block title %}Follows{% endblock %}

{% block body %}
<h2 style="margin-left:40px;">Your Follows</h2>
<ul style="margin-left:40px;">
    {% for user in follows %}
        <li>
            <a href="/fame/html/fame?userid={{ user.id }}">
                {{ user.first_name }} {{ user.last_name }}
            </a>
        </li>
    {% empty %}
        <li>No Follows found.</li>
    {% endfor %}
</ul>
{% endblock %}
