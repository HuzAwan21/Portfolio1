<!doctype html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta http-equiv="X-UA-Compatible" content="text/html"/>
    <title>Social Network - Demo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-SzlrxWUlpfuzQ+pcUCosxcglQRNAq/DZjVsC0lE40xsADsfeQoEypE+enwcOiGjk/bSuGGKHEyjSoQ1zVisanQ==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0e14 0%, #1a1f2e 100%);
            color: #f0f0f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
        }
        
        .body-content {
            flex: 1;
        }
        
        .navbar {
            background: linear-gradient(90deg, #0f1419 0%, #1a2030 100%) !important;
            padding: 0;
            border-bottom: 2px solid rgba(232, 255, 71, 0.1);
        }
        
        .navbar-brand {
            color: #f0f0f5 !important;
            padding: 1rem 1.5rem !important;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .navbar-brand:hover {
            color: #e8ff47 !important;
            background: rgba(232, 255, 71, 0.1);
        }
        
        .card {
            background: rgba(30, 35, 45, 0.8);
            border: 1px solid rgba(232, 255, 71, 0.15);
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            border-color: rgba(232, 255, 71, 0.3);
            box-shadow: 0 12px 48px rgba(232, 255, 71, 0.15);
            transform: translateY(-2px);
        }
        
        .flex-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #e8ff47 0%, #47c8ff 100%);
            color: #000 !important;
            border: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(232, 255, 71, 0.4);
        }
        
        .btn-secondary {
            background: rgba(71, 200, 255, 0.2);
            color: #47c8ff !important;
            border: 1px solid #47c8ff;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            background: rgba(71, 200, 255, 0.3);
            color: #e8ff47 !important;
            border-color: #e8ff47;
        }
        
        .btn-danger {
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757 !important;
            border: 1px solid #ff4757;
            font-weight: 500;
        }
        
        .btn-danger:hover {
            background: rgba(255, 71, 87, 0.3);
        }
        
        .btn-success {
            background: rgba(71, 255, 150, 0.2);
            color: #47ff96 !important;
            border: 1px solid #47ff96;
            font-weight: 500;
        }
        
        .btn-success:hover {
            background: rgba(71, 255, 150, 0.3);
        }
        
        .expertise-rating {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85em;
            margin-right: 8px;
            margin-bottom: 8px;
            font-weight: 600;
            border: 1px solid;
            background: rgba(255, 255, 255, 0.05);
        }
        
        .expertise-rating.ok {
            background: rgba(71, 255, 150, 0.15);
            color: #47ff96;
            border-color: rgba(71, 255, 150, 0.4);
        }
        
        .expertise-rating.neutral {
            background: rgba(71, 200, 255, 0.15);
            color: #47c8ff;
            border-color: rgba(71, 200, 255, 0.4);
        }
        
        .expertise-rating.bullshit {
            background: rgba(255, 71, 87, 0.15);
            color: #ff4757;
            border-color: rgba(255, 71, 87, 0.4);
        }
        
        .post-content {
            margin: 15px 0;
            font-size: 1em;
            line-height: 1.6;
            color: #ddd;
        }
        
        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
        }
        
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(232, 255, 71, 0.2);
            color: #f0f0f5;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        
        .form-control::placeholder {
            color: rgba(240, 240, 245, 0.5);
        }
        
        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #e8ff47;
            box-shadow: 0 0 15px rgba(232, 255, 71, 0.3);
            color: #f0f0f5;
        }
        
        textarea.form-control {
            resize: vertical;
        }
        
        h3 {
            color: #e8ff47;
            font-weight: 700;
            font-size: 1.5em;
            text-shadow: 0 0 20px rgba(232, 255, 71, 0.3);
        }
        
        .post-meta {
            color: #888;
            font-size: 0.85em;
        }
        
        .post-author-link {
            color: #47c8ff;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        .post-author-link:hover {
            color: #e8ff47;
            text-shadow: 0 0 10px rgba(232, 255, 71, 0.5);
        }
        
        .post-not-published {
            border-left: 4px solid #ff4757 !important;
        }
        
        .icon-gray {
            color: #888;
        }
        
        .icon-blue {
            color: #47c8ff;
        }
        
        .icon-green {
            color: #47ff96;
        }
        
        .icon-red {
            color: #ff4757;
        }
        
        #posts-container {
            padding: 20px;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

<div class="body-content">
    <header>
        <nav class="navbar navbar-expand-md navbar-dark bg-dark">
            <ul class="navbar-nav">
                <li class="nav-item active">
                    <a class="navbar-brand" href="javascript:void(0)">Home</a>
                </li>
                <li class="nav-item active">
                    <a class="navbar-brand" href="javascript:void(0)">Bullshitters</a>
                </li>
                <li class="nav-item active">
                    <a class="navbar-brand" href="javascript:void(0)">Experts</a>
                </li>
                <li class="nav-item active">
                    <a class="navbar-brand" href="javascript:void(0)">Similar Users</a>
                </li>
                <li class="nav-item active">
                    <a class="navbar-brand" href="javascript:void(0)">Follows</a>
                </li>
                <li class="nav-item active">
                    <a class="navbar-brand" href="javascript:void(0)">Followers</a>
                </li>
            </ul>
        </nav>
    </header>

    <br>
    <button type="button" class="btn btn-primary" style="margin-left:40px; font-size: 1em; padding: 10px 20px;" onclick="toggleMode()">
        <span id="mode-toggle">Switch to Community Mode</span>
    </button>

    <div class="card" style="margin: 20px 40px; width: 350px; margin-left: auto; margin-right: 40px;">
        <div style="padding: 15px;">
            <div class="flex-container">
                <input type="text" class="form-control" placeholder="Search posts..." id="searchInput" style="flex: 1;">
                <button type="button" class="btn btn-secondary" onclick="searchPosts()" style="padding: 0.5rem 1rem;">Search</button>
            </div>
        </div>
    </div>
    
    <div class="card" style="margin: 20px 40px;">
        <div style="padding: 20px;">
            <textarea class="form-control" rows="5" placeholder="What's on your mind?" style="margin-bottom: 12px;"></textarea>
            <button type="button" class="btn btn-primary" onclick="addPost()" style="font-weight: 600;">Post</button>
        </div>
    </div>
    <br>
    <h3 style="margin-left: 40px; margin-bottom: 20px;">Timeline</h3>
    <div id="posts-container"></div>
    <br><br>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let communityMode = false;
    
    const samplePosts = [
        {
            id: 1,
            author: {
                name: "Dr. Alice Chen",
                email: "alice.chen@university.edu",
                id: 1
            },
            content: "Recent advances in transformer architectures have revolutionized natural language processing. The attention mechanism's ability to capture long-range dependencies has enabled unprecedented performance on complex linguistic tasks.",
            date: "2 hours ago",
            published: true,
            expertise: {
                "Machine Learning": { value: "high_quality", color: "ok" },
                "Deep Learning": { value: "high_quality", color: "ok" }
            },
            citations: 24,
            replies: 8,
            ratings: {
                approve: 145,
                like: 89,
                dislike: 3
            }
        },
        {
            id: 2,
            author: {
                name: "Prof. Bob Wilson",
                email: "bob.wilson@tech.org",
                id: 2
            },
            content: "The quantum supremacy claims need further scrutiny. While the computational results are impressive, the practical applications remain limited and the error rates are still too high for most real-world problems.",
            date: "4 hours ago",
            published: true,
            expertise: {
                "Quantum Computing": { value: "needs_review", color: "neutral" },
                "Physics": { value: "high_quality", color: "ok" }
            },
            citations: 12,
            replies: 5,
            ratings: {
                approve: 67,
                like: 44,
                dislike: 15
            }
        },
        {
            id: 3,
            author: {
                name: "Emma Rodriguez",
                email: "emma.r@startup.io",
                id: 3
            },
            content: "Cryptocurrency is the future and will replace all traditional banking systems within 5 years. Blockchain technology is completely secure and has no vulnerabilities whatsoever.",
            date: "6 hours ago",
            published: true,
            expertise: {
                "Cryptocurrencies": { value: "misinformation", color: "bullshit" },
                "Finance": { value: "misinformation", color: "bullshit" }
            },
            citations: 18,
            replies: 34,
            ratings: {
                approve: 23,
                like: 12,
                dislike: 156
            }
        },
        {
            id: 4,
            author: {
                name: "Dr. James Park",
                email: "james.park@institute.com",
                id: 4
            },
            content: "Climate change is predominantly driven by human activities, with CO2 emissions being the primary contributor. The scientific consensus on this is overwhelming: 97% of climate scientists agree.",
            date: "8 hours ago",
            published: true,
            expertise: {
                "Climate Science": { value: "high_quality", color: "ok" },
                "Environmental Science": { value: "high_quality", color: "ok" }
            },
            citations: 42,
            replies: 19,
            ratings: {
                approve: 234,
                like: 178,
                dislike: 28
            }
        },
        {
            id: 5,
            author: {
                name: "Dr. Sarah Johnson",
                email: "sarah.j@research.org",
                id: 5
            },
            content: "Our latest study shows promising results in mRNA vaccine development for cancer treatment. The modified nucleotides have shown reduced inflammatory responses while maintaining immunogenicity.",
            date: "10 hours ago",
            published: false,
            expertise: {
                "Immunology": { value: "high_quality", color: "ok" },
                "Molecular Biology": { value: "high_quality", color: "ok" }
            },
            citations: 5,
            replies: 2,
            ratings: {
                approve: 12,
                like: 8,
                dislike: 0
            }
        }
    ];
    
    function renderPosts() {
        const container = document.getElementById('posts-container');
        container.innerHTML = '';
        
        samplePosts.forEach(post => {
            const postElement = document.createElement('div');
            postElement.className = 'card';
            postElement.style.marginBottom = '20px';
            postElement.style.marginLeft = '40px';
            postElement.style.marginRight = '40px';
            if (!post.published) {
                postElement.style.borderLeft = '4px solid #ff4757';
            }
            
            let publishedBadge = '';
            if (!post.published) {
                publishedBadge = '<span style="color:#ff4757; font-weight: 600;">&nbsp;[not published, only visible for you]</span>';
            } else {
                publishedBadge = '<span style="color:#47ff96; font-weight: 600;">&nbsp;[published, visible for everybody]</span>';
            }
            
            let expertiseHTML = '';
            for (const [area, data] of Object.entries(post.expertise)) {
                expertiseHTML += `<div class="expertise-rating ${data.color}"><b>${area}</b>: ${data.value.replace(/_/g, ' ')}</div>`;
            }
            
            const html = `
                <div style="padding: 20px;">
                    <div class="flex-container">
                        <b><a class="post-author-link" href="javascript:void(0)">${post.author.name}</a></b>&nbsp;
                        <span class="post-meta">${post.author.email}</span>&nbsp;&nbsp;
                        <span class="post-meta">${post.date}</span>
                        ${publishedBadge}
                    </div>
                    <br>
                    <p class="post-content">${post.content}</p>
                    
                    <div class="flex-container" style="margin-bottom: 15px;">
                        ${expertiseHTML}
                    </div>
                    
                    <div class="flex-container" style="margin-bottom: 20px; gap: 20px;">
                        <div><i class="fas fa-comment icon-gray"></i>&nbsp;<span style="color: #ddd;">${post.citations}</span></div>
                        <div><i class="fas fa-retweet icon-gray"></i>&nbsp;<span style="color: #ddd;">${post.replies}</span></div>
                        <div><i class="fas fa-thumbs-up icon-blue"></i>&nbsp;<span style="color: #47c8ff;">${post.ratings.approve}</span></div>
                        <div><i class="fas fa-heart icon-green"></i>&nbsp;<span style="color: #47ff96;">${post.ratings.like}</span></div>
                        <div><i class="fas fa-thumbs-down icon-red"></i>&nbsp;<span style="color: #ff4757;">${post.ratings.dislike}</span></div>
                    </div>
                    
                    <div class="flex-container" style="gap: 8px;">
                        <button type="button" class="btn btn-sm btn-primary" onclick="ratePost(${post.id}, 'approve')">
                            <i class="fas fa-thumbs-up"></i> Approve
                        </button>
                        <button type="button" class="btn btn-sm btn-success" onclick="ratePost(${post.id}, 'like')">
                            <i class="fas fa-heart"></i> Like
                        </button>
                        <button type="button" class="btn btn-sm btn-danger" onclick="ratePost(${post.id}, 'dislike')">
                            <i class="fas fa-thumbs-down"></i> Dislike
                        </button>
                    </div>
                </div>
            `;
            
            postElement.innerHTML = html;
            container.appendChild(postElement);
        });
    }
    
    function toggleMode() {
        communityMode = !communityMode;
        document.getElementById('mode-toggle').textContent = communityMode ? 'Switch to Standard Mode' : 'Switch to Community Mode';
    }
    
    function searchPosts() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        if (!query) {
            renderPosts();
            return;
        }
        
        const filtered = samplePosts.filter(post =>
            post.content.toLowerCase().includes(query) ||
            post.author.name.toLowerCase().includes(query)
        );
        
        const container = document.getElementById('posts-container');
        container.innerHTML = '';
        
        if (filtered.length === 0) {
            container.innerHTML = '<div style="padding: 40px; text-align: center; color: #888; margin: 20px 40px;">No posts matching your search.</div>';
            return;
        }
        
        filtered.forEach(post => {
            const postElement = document.createElement('div');
            postElement.className = 'card';
            postElement.style.marginBottom = '20px';
            postElement.style.marginLeft = '40px';
            postElement.style.marginRight = '40px';
            postElement.style.borderLeft = '4px solid #e8ff47';
            if (!post.published) {
                postElement.style.borderLeftColor = '#ff4757';
            }
            
            let publishedBadge = '';
            if (!post.published) {
                publishedBadge = '<span style="color:#ff4757; font-weight: 600;">&nbsp;[not published, only visible for you]</span>';
            } else {
                publishedBadge = '<span style="color:#47ff96; font-weight: 600;">&nbsp;[published, visible for everybody]</span>';
            }
            
            let expertiseHTML = '';
            for (const [area, data] of Object.entries(post.expertise)) {
                expertiseHTML += `<div class="expertise-rating ${data.color}"><b>${area}</b>: ${data.value.replace(/_/g, ' ')}</div>`;
            }
            
            const html = `
                <div style="padding: 20px;">
                    <div class="flex-container">
                        <b><a class="post-author-link" href="javascript:void(0)">${post.author.name}</a></b>&nbsp;
                        <span class="post-meta">${post.author.email}</span>&nbsp;&nbsp;
                        <span class="post-meta">${post.date}</span>
                        ${publishedBadge}
                    </div>
                    <br>
                    <p class="post-content">${post.content}</p>
                    
                    <div class="flex-container" style="margin-bottom: 15px;">
                        ${expertiseHTML}
                    </div>
                    
                    <div class="flex-container" style="margin-bottom: 20px; gap: 20px;">
                        <div><i class="fas fa-comment icon-gray"></i>&nbsp;<span style="color: #ddd;">${post.citations}</span></div>
                        <div><i class="fas fa-retweet icon-gray"></i>&nbsp;<span style="color: #ddd;">${post.replies}</span></div>
                        <div><i class="fas fa-thumbs-up icon-blue"></i>&nbsp;<span style="color: #47c8ff;">${post.ratings.approve}</span></div>
                        <div><i class="fas fa-heart icon-green"></i>&nbsp;<span style="color: #47ff96;">${post.ratings.like}</span></div>
                        <div><i class="fas fa-thumbs-down icon-red"></i>&nbsp;<span style="color: #ff4757;">${post.ratings.dislike}</span></div>
                    </div>
                    
                    <div class="flex-container" style="gap: 8px;">
                        <button type="button" class="btn btn-sm btn-primary" onclick="ratePost(${post.id}, 'approve')">
                            <i class="fas fa-thumbs-up"></i> Approve
                        </button>
                        <button type="button" class="btn btn-sm btn-success" onclick="ratePost(${post.id}, 'like')">
                            <i class="fas fa-heart"></i> Like
                        </button>
                        <button type="button" class="btn btn-sm btn-danger" onclick="ratePost(${post.id}, 'dislike')">
                            <i class="fas fa-thumbs-down"></i> Dislike
                        </button>
                    </div>
                </div>
            `;
            
            postElement.innerHTML = html;
            container.appendChild(postElement);
        });
    }
    
    function ratePost(postId, ratingType) {
        const post = samplePosts.find(p => p.id === postId);
        if (post) {
            post.ratings[ratingType]++;
            renderPosts();
        }
    }
    
    function addPost() {
        alert('In the full Django application, you can create and publish posts. This demo shows the read-only timeline view.');
    }
    
    // Initial render
    renderPosts();
</script>

</body>
</html>
