<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Planner - Dijkstra's Algorithm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0e14 0%, #1a1f2e 100%);
            color: #f0f0f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #e8ff47 0%, #47c8ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #999;
            font-size: 0.95em;
        }
        
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .panel {
            background: rgba(30, 35, 45, 0.8);
            border: 2px solid rgba(232, 255, 71, 0.2);
            padding: 20px;
            border-radius: 10px;
        }
        
        .panel-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #e8ff47;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(232, 255, 71, 0.2);
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            font-size: 0.95em;
            color: #bbb;
            margin-bottom: 5px;
        }
        
        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            background: rgba(12, 12, 14, 0.5);
            border: 1px solid rgba(232, 255, 71, 0.2);
            border-radius: 6px;
            color: #f0f0f5;
            font-size: 0.95em;
        }
        
        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #e8ff47;
            box-shadow: 0 0 10px rgba(232, 255, 71, 0.2);
        }
        
        textarea {
            width: 100%;
            padding: 10px;
            background: rgba(12, 12, 14, 0.5);
            border: 1px solid rgba(232, 255, 71, 0.2);
            border-radius: 6px;
            color: #f0f0f5;
            font-size: 0.9em;
            font-family: monospace;
            height: 120px;
            resize: vertical;
        }
        
        textarea:focus {
            outline: none;
            border-color: #e8ff47;
            box-shadow: 0 0 10px rgba(232, 255, 71, 0.2);
        }
        
        button {
            background: linear-gradient(135deg, #e8ff47 0%, #47c8ff 100%);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 10px;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(232, 255, 71, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .info-text {
            font-size: 0.85em;
            color: #999;
            margin-top: 5px;
        }
        
        .nodes-list {
            background: rgba(12, 12, 14, 0.5);
            border: 1px solid rgba(232, 255, 71, 0.1);
            border-radius: 6px;
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
            margin-top: 10px;
        }
        
        .node-item {
            padding: 8px;
            background: rgba(232, 255, 71, 0.05);
            border-radius: 4px;
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        
        .node-item:last-child {
            margin-bottom: 0;
        }
        
        .node-id {
            color: #e8ff47;
            font-weight: 600;
        }
        
        .results-panel {
            background: rgba(30, 35, 45, 0.8);
            border: 2px solid rgba(232, 255, 71, 0.2);
            padding: 20px;
            border-radius: 10px;
            grid-column: 1 / -1;
        }
        
        .path-result {
            background: rgba(232, 255, 71, 0.05);
            border-left: 3px solid #e8ff47;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        
        .path-result h3 {
            color: #e8ff47;
            margin-bottom: 10px;
        }
        
        .path-nodes {
            font-family: monospace;
            color: #47c8ff;
            margin-bottom: 10px;
            word-break: break-all;
        }
        
        .path-distance {
            color: #ccc;
            font-size: 0.95em;
        }
        
        .error {
            background: rgba(255, 71, 71, 0.1);
            border-left: 3px solid #ff4747;
            padding: 15px;
            border-radius: 6px;
            color: #ff9999;
        }
        
        .success {
            background: rgba(71, 255, 150, 0.1);
            border-left: 3px solid #47ff96;
            padding: 15px;
            border-radius: 6px;
            color: #99ffcc;
        }
        
        .example-button {
            background: rgba(71, 200, 255, 0.1);
            color: #47c8ff;
            border: 1px solid #47c8ff;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            margin-top: 10px;
        }
        
        .example-button:hover {
            background: rgba(71, 200, 255, 0.2);
        }
        
        @media (max-width: 1000px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Route Planner</h1>
            <p class="subtitle">Find shortest paths using Dijkstra's Algorithm</p>
        </div>
        
        <div class="main-grid">
            <div class="panel">
                <div class="panel-title">Graph Input</div>
                <div class="input-group">
                    <label>Edges (format: nodeA nodeB distance)</label>
                    <textarea id="graphInput" placeholder="A B 5&#10;B C 3&#10;A C 10&#10;B D 2&#10;C D 4"></textarea>
                    <p class="info-text">Enter edges with node names and distances. One edge per line.</p>
                </div>
                <div class="button-group">
                    <button onclick="loadGraph()">Load Graph</button>
                    <button class="example-button" onclick="loadExample()">Load Example</button>
                </div>
                <div class="nodes-list" id="nodesList"></div>
            </div>
            
            <div class="panel">
                <div class="panel-title">Find Route</div>
                <div class="input-group">
                    <label>Start Node (ID)</label>
                    <input type="text" id="startNode" placeholder="e.g., A" value="A">
                </div>
                <div class="input-group">
                    <label>End Node (ID)</label>
                    <input type="text" id="endNode" placeholder="e.g., D" value="D">
                </div>
                <button onclick="findRoute()" style="width: 100%;">Find Shortest Route</button>
                <div id="message"></div>
            </div>
        </div>
        
        <div class="results-panel" id="resultsPanel" style="display: none;">
            <div class="panel-title">Route Results</div>
            <div id="results"></div>
        </div>
    </div>

    <script>
        class RoutePlanner {
            constructor() {
                this.nodes = new Set();
                this.edges = new Map(); // adjacency list: nodeName -> [{neighbor, distance}, ...]
                this.history = [];
            }
            
            addEdge(from, to, distance) {
                this.nodes.add(from);
                this.nodes.add(to);
                
                if (!this.edges.has(from)) {
                    this.edges.set(from, []);
                }
                this.edges.get(from).push({ neighbor: to, distance: parseFloat(distance) });
            }
            
            dijkstra(start, end) {
                if (!this.nodes.has(start) || !this.nodes.has(end)) {
                    throw new Error(`Start or end node not found in graph`);
                }
                
                const distances = {};
                const previous = {};
                const unvisited = new Set();
                
                // Initialize
                for (const node of this.nodes) {
                    distances[node] = node === start ? 0 : Infinity;
                    previous[node] = null;
                    unvisited.add(node);
                }
                
                while (unvisited.size > 0) {
                    // Find unvisited node with minimum distance
                    let current = null;
                    let minDist = Infinity;
                    
                    for (const node of unvisited) {
                        if (distances[node] < minDist) {
                            minDist = distances[node];
                            current = node;
                        }
                    }
                    
                    if (current === null || distances[current] === Infinity) {
                        throw new Error(`No route exists between ${start} and ${end}`);
                    }
                    
                    unvisited.delete(current);
                    
                    if (current === end) {
                        break;
                    }
                    
                    // Check neighbors
                    if (this.edges.has(current)) {
                        for (const edge of this.edges.get(current)) {
                            const neighbor = edge.neighbor;
                            const edgeDistance = edge.distance;
                            
                            if (unvisited.has(neighbor)) {
                                const newDistance = distances[current] + edgeDistance;
                                
                                if (newDistance < distances[neighbor]) {
                                    distances[neighbor] = newDistance;
                                    previous[neighbor] = current;
                                }
                            }
                        }
                    }
                }
                
                // Reconstruct path
                const path = [];
                let current = end;
                while (current !== null) {
                    path.unshift(current);
                    current = previous[current];
                }
                
                return {
                    path: path,
                    distance: distances[end]
                };
            }
            
            clear() {
                this.nodes.clear();
                this.edges.clear();
            }
            
            getNodesList() {
                return Array.from(this.nodes).sort();
            }
        }
        
        const planner = new RoutePlanner();
        
        function loadGraph() {
            const input = document.getElementById('graphInput').value.trim();
            const message = document.getElementById('message');
            
            if (!input) {
                message.innerHTML = '<div class="error">Please enter graph edges</div>';
                return;
            }
            
            try {
                planner.clear();
                const lines = input.split('\n');
                
                for (const line of lines) {
                    const parts = line.trim().split(/\s+/);
                    if (parts.length < 3) continue;
                    
                    const [from, to, distance] = parts;
                    planner.addEdge(from, to, distance);
                }
                
                if (planner.nodes.size === 0) {
                    throw new Error('No valid edges found');
                }
                
                updateNodesList();
                message.innerHTML = `<div class="success">Graph loaded! Found ${planner.nodes.size} nodes and edges.</div>`;
                document.getElementById('resultsPanel').style.display = 'none';
            } catch (e) {
                message.innerHTML = `<div class="error">Error: ${e.message}</div>`;
            }
        }
        
        function updateNodesList() {
            const nodesList = document.getElementById('nodesList');
            const nodes = planner.getNodesList();
            
            if (nodes.length === 0) {
                nodesList.innerHTML = '<p style="color: #999;">No nodes loaded</p>';
                return;
            }
            
            nodesList.innerHTML = nodes.map(node => 
                `<div class="node-item"><span class="node-id">${node}</span></div>`
            ).join('');
        }
        
        function findRoute() {
            const startNode = document.getElementById('startNode').value.trim();
            const endNode = document.getElementById('endNode').value.trim();
            const message = document.getElementById('message');
            
            if (!startNode || !endNode) {
                message.innerHTML = '<div class="error">Please enter both start and end nodes</div>';
                return;
            }
            
            if (planner.nodes.size === 0) {
                message.innerHTML = '<div class="error">Please load a graph first</div>';
                return;
            }
            
            try {
                const result = planner.dijkstra(startNode, endNode);
                displayResults(result, startNode, endNode);
                message.innerHTML = '<div class="success">Route found!</div>';
            } catch (e) {
                message.innerHTML = `<div class="error">Error: ${e.message}</div>`;
                document.getElementById('resultsPanel').style.display = 'none';
            }
        }
        
        function displayResults(result, start, end) {
            const resultsPanel = document.getElementById('resultsPanel');
            const resultsDiv = document.getElementById('results');
            
            const pathStr = result.path.join(' → ');
            
            resultsDiv.innerHTML = `
                <div class="path-result">
                    <h3>Shortest Path from ${start} to ${end}</h3>
                    <div class="path-nodes">${pathStr}</div>
                    <div class="path-distance"><strong>Total Distance:</strong> ${result.distance}</div>
                </div>
            `;
            
            resultsPanel.style.display = 'block';
        }
        
        function loadExample() {
            document.getElementById('graphInput').value = `A B 5
B C 3
A C 10
B D 2
C D 4
D E 6
A E 12`;
            loadGraph();
            document.getElementById('startNode').value = 'A';
            document.getElementById('endNode').value = 'E';
        }
    </script>
</body>
</html>
